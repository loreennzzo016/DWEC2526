<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro JS Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png" alt="JS Logo" class="js-logo" />
      <h1>Pomodoro Timer</h1>
    </header>

    <section class="timers">
      <div class="timer focus">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png" alt="JS Logo" class="logo" />
        <input type="number" id="focusInput" min="1" max="60" value="25" /> <span>min</span>
        <div class="time" id="focusTime">25:00</div>
        <div class="controls">
          <button id="startFocus" class="btn red">▶</button>
          <button id="pauseFocus" class="btn red">⏸</button>
        </div>
      </div>

      <div class="timer break">
        <div class="icon">🍇</div>
        <input type="number" id="breakInput" min="1" max="30" value="5" /> <span>min</span>
        <div class="time" id="breakTime">05:00</div>
        <div class="controls">
          <button id="startBreak" class="btn blue">▶</button>
          <button id="pauseBreak" class="btn blue">⏸</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
